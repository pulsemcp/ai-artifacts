name: trace-capture e2e

on:
  push:
    branches: [main, "feat/**"]
    paths:
      - "hooks/trace-capture/**"
      - ".github/workflows/trace-capture-e2e.yml"
  pull_request:
    paths:
      - "hooks/trace-capture/**"
      - ".github/workflows/trace-capture-e2e.yml"

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hooks/trace-capture
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm install
      - run: npm run build
      - run: npm test

  e2e:
    runs-on: ubuntu-latest
    needs: unit-tests
    defaults:
      run:
        working-directory: hooks/trace-capture
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: google-github-actions/setup-gcloud@v2

      - name: Authenticate to GCS
        env:
          GCS_SA_KEY: ${{ secrets.GCS_SA_KEY }}
        run: |
          echo "$GCS_SA_KEY" > /tmp/gcs-sa-key.json
          gcloud auth activate-service-account --key-file=/tmp/gcs-sa-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcs-sa-key.json" >> "$GITHUB_ENV"

      - run: npm install
      - run: npm run build

      - name: Install Claude Code (pinned v2.1.98)
        run: npm install -g @anthropic-ai/claude-code@2.1.98

      - name: Run e2e test (Claude Code + mock API + real GCS)
        run: node test/e2e/hook-fires.mjs
